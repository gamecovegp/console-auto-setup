name: build

# Build a frozen CAS bundle for each target OS from ONE push.
#
# WHY a matrix (not cross-compile): PyInstaller cannot cross-compile — a Windows .exe
# must be produced on Windows, a macOS bundle on macOS, an ELF on Linux. The only sane
# way to ship "an executable for each target platform" is to run the SAME build on a
# native runner per OS. That is exactly this matrix.
#
# Each job: checkout -> setup-python 3.14 -> pip install pyinstaller -> pyinstaller scripts/cas.spec
# -> upload dist/ as a per-OS artifact. The bundle is dist/cas/ (cas-gui + cas + _internal/);
# data/ (profiles, Apps, …) and platform-tools/ are NOT built here — they are operator-side external
# siblings dropped in next to the exe at deploy time (see docs/PACKAGING.md).

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:   # let an operator kick a build by hand

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false           # one OS failing must not cancel the others
      matrix:
        include:
          - os: windows-latest   # PRIMARY: the operator rig
            artifact: cas-windows
            os_tag: windows
          - os: ubuntu-latest     # this dev host's OS
            artifact: cas-linux
            os_tag: linux
          - os: macos-latest      # future/optional
            artifact: cas-macos
            os_tag: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          # 3.14 is the dev/build interpreter (matches the host). setup-python serves it
          # via the python-versions manifest; if a runner image can't resolve 3.14 yet,
          # flip allow-prereleases off has no effect (3.14 is final) — instead pin the
          # closest available with "3.14.x" and, as a last resort, "3.13" (the app is
          # stdlib-only + version-agnostic, so 3.13 builds a working bundle too). The
          # FALLBACK below auto-retries on 3.13 if 3.14 is unavailable on the image.
          python-version: "3.14"
          allow-prereleases: true
        id: setup_py_314
        continue-on-error: true

      - name: Set up Python 3.13 (fallback if 3.14 unavailable on the runner image)
        if: steps.setup_py_314.outcome == 'failure'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Show interpreter
        run: python -c "import sys; print(sys.version)"

      - name: Run unit tests (stdlib unittest — no third-party runtime deps)
        # Tests are version-agnostic and must pass before we freeze. Run from tests/ so
        # unittest discovery is unaffected by any glob characters in the checkout path.
        working-directory: tests
        run: python -m unittest test_cas -v

      - name: Install PyInstaller + Pillow (BUILD-ONLY dependencies)
        # >= 6.11 is the first release with Python 3.14 support; pin the floor so an old
        # cached pip can't grab a wheel that chokes on 3.14 or misses the Tk runtime hook.
        # Pillow is needed ONLY on macOS: assets/cas.icns is a PNG, and PyInstaller's .app
        # BUNDLE auto-converts it to a real .icns via Pillow. Build-only — cas/ never imports
        # PIL, so it is not bundled into the frozen app (the runtime stays stdlib-only).
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pyinstaller>=6.11" pillow

      - name: Inject __version__ from the tag (tag builds only)
        # So the frozen app reports the release version and the in-app updater compares
        # correctly. Python (not sed) for cross-runner portability (BSD sed on macOS differs).
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          python - "$V" <<'PY'
          import re, sys, pathlib
          v = sys.argv[1]
          p = pathlib.Path("cas/__init__.py")
          p.write_text(re.sub(r'__version__ = ".*"', f'__version__ = "{v}"', p.read_text()))
          print("version ->", v)
          PY

      - name: Freeze with PyInstaller
        # Builds BOTH exes into one dist/cas/ (see scripts/cas.spec). --noconfirm so a stale
        # build/ or dist/ from a warm cache never blocks the rebuild. The spec anchors its
        # datas to the repo root via SPECPATH, so running it from the repo root is correct.
        run: pyinstaller --noconfirm scripts/cas.spec

      - name: Sanity-check the bundle was produced
        shell: bash
        run: |
          echo "dist/ contents:"
          ls -R dist || true
          test -d dist/cas

      - name: Smoke-test the frozen exe actually imports `cas`
        # The freeze step can silently produce a bundle MISSING the cas package (e.g. a bad
        # pathex leaving `cas` off the analysis import path) and still exit 0 — the failure
        # only surfaces at LAUNCH (ModuleNotFoundError: No module named 'cas'). That is exactly
        # how v0.3.0 shipped a dead exe. So RUN the frozen console exe here: `cas --help` imports
        # cas.cli -> the whole cas package and exits 0 without touching a device. The GUI exe
        # shares the same COLLECT bundle + cas package, so this covers cas-gui too.
        shell: bash
        run: |
          BIN="dist/cas/cas"
          [ "${{ runner.os }}" = "Windows" ] && BIN="dist/cas/cas.exe"
          "$BIN" --help

      - name: Verify the frozen bundle actually SHIPS the device-side resources
        # `cas --help` only proves the Python package imports — it does NOT touch the read-only
        # resources cas pushes to the device (magisk-patch toolkit, scrub.sh, grant-persist.sh). A
        # spec that forgets one freezes a bundle that imports fine but fails at RUNTIME on the
        # operator's rig (e.g. "could not push the Magisk patch toolkit" -> unit never roots/boots).
        # Assert each required resource is present in dist/ (layout-agnostic find: onedir puts datas
        # under _internal/). This runs on windows-latest too, so a Windows-incomplete bundle fails here.
        shell: bash
        run: |
          set -e
          req=(
            provision/root/restore.sh
            provision/root/capture.sh
            provision/root/lib-root.sh
            provision/root/scrub.sh
            provision/root/grant-persist.sh
            provision/root/magisk-patch/boot_patch.sh
            provision/root/magisk-patch/util_functions.sh
            provision/root/magisk-patch/magiskboot
            provision/root/magisk-patch/magiskinit
            provision/root/magisk-patch/magisk
            provision/root/magisk-patch/init-ld
            provision/root/magisk-patch/stub.apk
            assets/cas-window.png
          )
          fail=0
          for r in "${req[@]}"; do
            if find dist/cas -path "*/$r" | grep -q .; then
              echo "OK   $r"
            else
              echo "MISSING  $r"; fail=1
            fi
          done
          [ "$fail" = 0 ] || { echo "::error::frozen bundle is missing required device-side resources"; exit 1; }

      - name: Bundle Windows operator helpers (USB driver setup)
        # Ship the .bat helpers + the drivers\ tree INSIDE the Windows kit (dist/cas) so the operator can
        # close the USB-driver gap that blocks ⓪ Root/③ Seal on Windows: adb works, but the FLASH interfaces
        # (fastboot bootloader + Qualcomm EDL 9008) need drivers Windows doesn't ship (Linux gets them free
        # via udev). setup-windows.bat -> drivers\install-drivers.ps1 publishes them to the driver store
        # (one-time, fleet-wide, no Zadig). The whole drivers\ dir (installer + fallback INFs + vendor drop
        # slots) must be present or the helper can't run. Windows-only; no-op on the other runners.
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp scripts/setup-windows.bat scripts/fastboot-check.bat dist/cas/
          cp -r scripts/drivers dist/cas/drivers
          ls -1 dist/cas/*.bat
          echo "drivers/ tree:"; find dist/cas/drivers -type f | sort
          # fail loudly if the driver installer or its fallback INFs didn't make it into the kit
          for f in drivers/install-drivers.ps1 \
                   drivers/fallback/fastboot/cas-fastboot.inf \
                   drivers/fallback/edl/cas-edl-9008.inf; do
            test -f "dist/cas/$f" || { echo "::error::Windows kit missing $f"; exit 1; }
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

      - name: Package release zip + sha256 (tag builds only)
        # Zip dist/cas -> cas-<os>.zip and record its sha256 (Python = cross-runner; no zip/7z needed).
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          python - "${{ matrix.os_tag }}" <<'PY'
          import shutil, hashlib, pathlib, sys
          osk = sys.argv[1]
          z = shutil.make_archive(f"cas-{osk}", "zip", "dist", "cas")   # -> cas-<os>.zip (contains cas/)
          sha = hashlib.sha256(pathlib.Path(z).read_bytes()).hexdigest()
          pathlib.Path(f"{osk}.sha256").write_text(sha)
          print(z, sha)
          PY

      - name: Upload release artifacts (zip + sha) (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: rel-${{ matrix.os_tag }}
          path: |
            cas-${{ matrix.os_tag }}.zip
            ${{ matrix.os_tag }}.sha256
          if-no-files-found: error

  # Assemble latest.json from the three per-OS shas and publish the GitHub Release.
  # The in-app updater reads latest.json from releases/latest/download/latest.json.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to create the Release
    steps:
      - name: Download per-OS release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rel-*
          path: rel

      - name: Build latest.json
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"; V="${TAG#v}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          python - "$V" "$BASE" <<'PY'
          import json, sys, pathlib
          v, base = sys.argv[1], sys.argv[2]
          assets = {}
          for osk in ("windows", "linux", "macos"):
              sha = pathlib.Path(f"rel/rel-{osk}/{osk}.sha256")
              if sha.exists():
                  assets[osk] = {"url": f"{base}/cas-{osk}.zip", "sha256": sha.read_text().strip()}
          pathlib.Path("latest.json").write_text(
              json.dumps({"version": v, "notes": f"CAS {v}", "assets": assets}, indent=2))
          print(open("latest.json").read())
          PY

      - name: Publish Release (zips + latest.json)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rel/rel-windows/cas-windows.zip
            rel/rel-linux/cas-linux.zip
            rel/rel-macos/cas-macos.zip
            latest.json
